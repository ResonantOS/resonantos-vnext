name: Browser-First CI

on:
  push:
    branches:
      - browser-first-preview
  pull_request:
    branches:
      - browser-first-preview

jobs:
  test:
    name: Browser-First Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Validate manifest.json
        run: |
          python3 -m json.tool browser-first/resonantos-side-panel-extension/manifest.json > /dev/null
          echo "manifest.json is valid JSON"

      - name: Syntax check all extension JS source files
        run: |
          echo "Checking syntax of all extension source JS files..."
          find browser-first/resonantos-side-panel-extension/src -name "*.js" | while read f; do
            node --check "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Run browser-first tests (107+ must pass)
        run: npm run test:browser-first

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ResonantOS</title>
    <link rel="stylesheet" href="./main-workspace.css" />
  </head>
  <body>
    <main class="workspace-shell" aria-label="ResonantOS main workspace">
      <aside class="workspace-rail" aria-label="ResonantOS workspaces">
        <div class="brand-mark">R</div>
        <button type="button" class="rail-item active" data-workspace="answer">Answer</button>
        <button type="button" class="rail-item" data-workspace="artifacts">Artifacts</button>
        <button type="button" class="rail-item" data-workspace="addons">Add-ons</button>
        <button type="button" class="rail-item" data-workspace="memory">Living Archive</button>
        <button type="button" class="rail-item" data-workspace="hermes">Hermes</button>
        <button type="button" class="rail-item" data-workspace="opencode">OpenCode</button>
        <button type="button" class="rail-item" data-workspace="settings">Settings</button>
      </aside>

      <section class="answer-workspace" aria-label="Augmentor full-screen chat">
        <header class="workspace-topbar">
          <nav aria-label="Answer views">
            <button class="topbar-tab active" type="button">Answer</button>
            <button class="topbar-tab" type="button">Links</button>
            <button class="topbar-tab" type="button">Images</button>
          </nav>
          <div class="topbar-actions">
            <button id="new-chat" type="button" class="share-button">New Chat</button>
          </div>
        </header>

        <section id="transcript" class="answer-thread" aria-live="polite"></section>

        <form id="command-form" class="main-composer" aria-label="Ask Augmentor">
          <textarea id="command-input" rows="2" placeholder="Ask Augmentor anything"></textarea>
          <div id="attachment-strip" class="attachment-strip" hidden></div>
          <div class="composer-toolbar">
            <button id="attach-file" type="button" class="icon-button" title="Attach file" aria-label="Attach file">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </button>
            <input id="file-input" type="file" multiple hidden />
            <button id="read-page" type="button" class="icon-button" title="Read current browser page from sidebar" aria-label="Read current browser page">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6Z"/><circle cx="12" cy="12" r="2.5"/></svg>
            </button>
            <button id="save-intake" type="button" class="icon-button" title="Save current browser page to Living Archive intake" aria-label="Save current browser page to Living Archive intake">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h11l3 3v13H5z"/><path d="M8 4v6h8V4"/><path d="M8 16h8"/></svg>
            </button>
            <button id="save-selection" type="button" class="icon-button" title="Save selected browser text to Living Archive intake" aria-label="Save selected browser text to Living Archive intake">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="M8 9h8"/><path d="M8 13h5"/><path d="m15 15 2 2 3-4"/></svg>
            </button>
            <button id="context-toggle" type="button" class="icon-button context-usage-button" title="Open browser context status in sidebar" aria-label="Open browser context status in sidebar">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12a8 8 0 1 1 16 0"/><path d="M4 12h4"/><path d="M16 12h4"/><path d="M12 4v4"/><path d="M8.5 17.5 12 12l3.5 5.5"/></svg>
            </button>
            <select id="model-select" class="model-select" aria-label="Connected model">
              <option value="MiniMax-M2.7">MiniMax 2.7</option>
              <option value="MiniMax-M2.7-highspeed">MiniMax 2.7 High Speed</option>
              <option value="gpt-5.5">GPT 5.5</option>
              <option value="gpt-5.4-mini">GPT 5.4 Mini</option>
              <option value="batiai/gemma4-e2b:q4">Gemma 4 2B</option>
            </select>
            <select id="thinking-depth" class="depth-select" aria-label="Thinking depth">
              <option value="minimal">Minimal</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
            <button id="dictate-button" type="button" class="icon-button muted" title="Audio dictate is not available in this browser runtime yet." aria-label="Dictate">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V7a3 3 0 0 0-3-3Z"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/></svg>
            </button>
            <button id="connection-line" type="button" class="connection-line" title="Connected to MiniMax 2.7 · Ready" aria-label="Connected to MiniMax 2.7 · Ready">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h4l2-7 4 14 2-7h4"/></svg>
            </button>
            <button id="context-meter" type="button" class="context-meter" title="Estimated conversation context captured for this session." aria-label="Context usage 0 percent">
              <span class="context-meter-label">0%</span>
            </button>
            <button type="submit" class="send-button" aria-label="Send">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
            </button>
          </div>
        </form>
      </section>
    </main>
    <script src="./bridge-config.generated.js"></script>
    <script type="module" src="./main-workspace.js"></script>
  </body>
</html>
